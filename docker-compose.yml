version: '3.8'

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ridata
      POSTGRES_PASSWORD: Temitope001
      POSTGRES_DB: fpl_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: richardilemon@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Temitope001
    ports:
      - "8081:80"
    depends_on:
      - postgres

  loader:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://ridata:Temitope001@postgres:5432/fpl_db
    volumes:
      - ./scripts:/app/scripts

volumes:
  pgdata:
